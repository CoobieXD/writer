<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta http-equiv="x-ua-compatible" content="ie=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Писец</title>
	<meta name="description" content="Писец 2.0 — Генератор рукописных конспектов. Онлайн-сервис для печати конспектов">
	<meta name="keywords" content="Coobie, Куби, handwritten, cursive font, писец, конспект, рукописный шрифт, печать конспектов, генератор конспектов, лайфхак">
	<meta name="author" content="Coobie">
	<meta name="twitter:card" content="summary">
	<meta name="twitter:site" content="@c00613">
	<meta property="fb:admins" content="c00613">
	<meta property="og:type" content="website">
	<meta property="og:title" itemprop="headline" name="twitter:title" content="Писец 2.0 — генератор рукописных конспектов для ленивых студентов и не только :p">
	<meta property="og:description" itemprop="description" name="twitter:description" content="Онлайн-сервис для перевода цифрового текста в рукописный используя как шрифт человеческий почерк с последующей печатью на принтере, попросту говоря «генератор рукописных конспектов» для ленивых студентов и не только :з">
	<meta property="og:url" itemprop="url" content="https://coobiexd.github.io/writer/">
	<meta property="og:image" itemprop="image" name="twitter:image:src" content="https://coobiexd.github.io/writer/og_image.png">
	<link rel="icon" href="/favicon-16x16.png" sizes="16x16">
	<link rel="icon" href="/favicon-32x32.png" sizes="32x32">
	<meta name="theme-color" content="#1476bb">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<link rel="stylesheet" type="text/css" href="css/main.css">

<body class="loading">

	<main>
		<div class="section left">
			<div class="airpods airpod_l"></div>
			<div class="airpods airpod_r"></div>
			<div class="ipad_border">
				<div class="ipad">
					<div class="ipad_screen">
						<label for="text" class="visually-hidden">Текст для перевода в рукопись</label>
					<textarea id="text" placeholder="Введите текст.." autofocus></textarea>
						<button id="write" aria-label="Перевести введённый текст в рукопись" disabled style="display: none;">Перевести в рукопись</button>
					</div>
					<div class="ipad_home"></div>
				</div>
			</div>
		</div>
		<div class="section middle">
			<div class="pencil"></div>
		</div>
		<div class="section right">
			<div class="sheet-handle"><span></span></div>
			<div class="clipboard">
				<div class="paperclip"></div>
				<div id="list" class="">
					<canvas width="4960" height="7016" id="canvas" style="width: 100%; margin: 0 auto;">Обновите браузер</canvas>
				</div>
			</div>
		</div>
	</main>

	<script defer src="js/sprite-data.js"></script>
	<script defer src="js/writer.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
	<script defer src="js/main.js"></script>
</body>
</html>
